{% extends "base.html" %}
{% block title %}Sign In – Molecular Theory Explained{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <!-- Header -->
    <div class="auth-title">⚛ Molecular Theory</div>
    <p class="auth-sub">Sign in or create an account to start exploring.</p>

    <!-- Tab toggles -->
    <div class="form-tabs">
      <button class="form-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="form-tab" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" method="POST" action="{{ url_for('login', next=next) }}">
      <input type="hidden" name="action" value="login" />

      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" placeholder="Your password" required />
      </div>

      <div class="form-submit">
        <button type="submit" class="btn btn-primary">Sign In →</button>
      </div>

      <p style="margin-top: 20px; text-align: center; color: var(--text-muted); font-size: 0.88rem;">
        No account yet?
        <a href="#" onclick="switchTab('register'); return false;" style="color: var(--teal);">Create one</a>
      </p>
    </form>

    <!-- REGISTER FORM (hidden by default) -->
    <form id="registerForm" method="POST" action="{{ url_for('login') }}" style="display:none;">
      <input type="hidden" name="action" value="register" />

      <div class="form-group">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" name="name" placeholder="John Doe" required />
      </div>

      <div class="form-group">
        <label for="regEmail">Email Address</label>
        <input type="email" id="regEmail" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" name="password" placeholder="Choose a strong password" required minlength="6" />
      </div>

      <div class="form-submit">
        <button type="submit" class="btn btn-primary">Create Account →</button>
      </div>

      <p style="margin-top: 20px; text-align: center; color: var(--text-muted); font-size: 0.88rem;">
        Already have an account?
        <a href="#" onclick="switchTab('login'); return false;" style="color: var(--teal);">Sign in</a>
      </p>
    </form>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function switchTab(tab) {
    const loginForm    = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const tabLogin     = document.getElementById('tabLogin');
    const tabRegister  = document.getElementById('tabRegister');

    if (tab === 'login') {
      loginForm.style.display    = 'block';
      registerForm.style.display = 'none';
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
    } else {
      loginForm.style.display    = 'none';
      registerForm.style.display = 'block';
      tabLogin.classList.remove('active');
      tabRegister.classList.add('active');
    }
  }
</script>
{% endblock %}
