services:
  - type: web
    name: molecular-theory-explained
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/database.db
      - key: PYTHON_VERSION
        value: 3.11.0
